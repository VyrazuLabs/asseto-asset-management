<div class="modal-content">
    <div class="modal-header bg-dark">
        <h5 class="modal-title white w-100 text-center" id="myModalLabel160">{{modal_title}}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"
            aria-label="Close">
        </button>
    </div>
    <form hx-post='{{request.path}}' novalidate>
        {% csrf_token %}
        <div class="modal-body">
            <label>Type Name <span></span></label>
            <span class="text-danger">*</span>
            <div class="form-group">
                {{form.name}}
                {% for error in form.name.errors %}
                    <small class="text-danger mb-3">{{ error }}</small>
                {% endfor %}
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-sm btn-light-secondary"
                data-bs-dismiss="modal">
                <i class="bx bx-x d-block d-sm-none"></i>
                <span class="d-none d-sm-block">Close</span>
            </button>
            <button type="submit" class="btn btn-sm btn-info ml-1"
                onclick="this.innerHTML = `<span class='spinner-grow spinner-grow-sm' role='status' aria-hidden='true'></span> Saving...`;"
            >
                <i class="bx bx-check d-block d-sm-none"></i>
                <span class="d-none d-sm-block">Save</span>
            </button>
        </div>
    </form>
</div>

<script>
    htmx.on("htmx:beforeSwap", (e) => {
        if (
            (e.detail.target.id == "add-license-type-modal-content" || e.detail.target.id == "update-license-type-modal-content") && !e.detail.xhr.response){
                location.reload();
        }
    });
</script>
<script>
function requestAndSendNotification() {
  if (Notification.permission === "granted") {
    sendNotification();
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission().then(permission => {
      if (permission === "granted") {
        sendNotification();
      }
    });
  }
}

function sendNotification() {
  const title = "Successfully Added License Type";
  const options = {
    body: "Successfully Added License Type.",
    icon: "/static/images/logo/favicon.png",
  };

  new Notification(title, options);
}
</script>
{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", () => {
  {% for message in messages %}
    {% if message.tags == "success" %}
      requestAndSendNotification();
    {% endif %}
  {% endfor %}
});
</script>
{% endif %}
