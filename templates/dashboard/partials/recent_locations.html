<div class="table-responsive">
    <table class="table premium-table">
        <thead>
            <tr>
                <th style="width: 60px;"></th>
                <th>Location</th>
                <th>City</th>
                <th>Date Added</th>
            </tr>
        </thead>
        <tbody>
            {% for location in all_location_list %}
            <tr>
                <td>
                    <div class="metric-icon-box metric-orange" style="width: 38px; height: 38px; border-radius: 8px; font-size: 1rem; margin: 0;">
                        <i class="bi bi-geo-alt-fill"></i>
                    </div>
                </td>
                <td class="fw-bold">{{ location.address.address_line_one }}</td>
                <td class="text-muted">{{ location.address.city|default:"---" }}</td>
                <td class="text-muted">{{ location.formatted_date }}</td>
                <td style="width: 40px; text-align: right;">
                    <a href="{% url 'dashboard:location_details' location.id %}" class="row-link-icon">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center py-4 text-muted">No recent locations found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
