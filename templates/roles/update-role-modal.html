<div class="modal-content">
    <div class="modal-header-custom">
        <h5 class="modal-title"><i class="bi bi-shield-lock"></i> Update Role</h5>

<style>
/* Modal Design System */

}

.modal-header-custom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--color-border);
}

.modal-header-custom .modal-title {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--color-text);
    margin: 0;
}

.modal-header-custom .modal-title i {
    color: var(--color-primary);
}

.btn-close-modal {
    background: rgba(var(--color-muted-rgb), 0.1);
    border: none;
    color: var(--color-muted);

    height: 32px;

}

}

    overflow-y: auto;
}

.form-group label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
    display: block;

.form-group input[type="text"] {

    padding: 0.75rem 1rem;
    background: var(--color-bg);

<script>
function initRolePermissions() {
    const mainCheckAll = document.getElementById('checkall');
    const moduleCheckboxes = document.querySelectorAll('.ischeck');
    const childCheckboxes = document.querySelectorAll('.isscheck');

    const updateStates = () => {
        moduleCheckboxes.forEach(m => {
            const children = document.querySelectorAll('.isscheck_' + m.dataset.id);
            m.checked = [...children].every(c => c.checked);
            m.indeterminate = ![...children].every(c => c.checked) && [...children].some(c => c.checked);
        });
        if(mainCheckAll) {
            mainCheckAll.checked = [...childCheckboxes].every(c => c.checked);
            mainCheckAll.indeterminate = ![...childCheckboxes].every(c => c.checked) && [...childCheckboxes].some(c => c.checked);
        }
    };

    updateStates();

    if (mainCheckAll) {
        mainCheckAll.addEventListener('change', e => {
            childCheckboxes.forEach(c => c.checked = e.target.checked);
            moduleCheckboxes.forEach(m => m.checked = e.target.checked);
        });
    }

    moduleCheckboxes.forEach(m => {
        m.addEventListener('change', e => {
            document.querySelectorAll('.isscheck_' + e.target.dataset.id).forEach(c => c.checked = e.target.checked);
            updateStates();
        });
    });

    childCheckboxes.forEach(c => {
        c.addEventListener('change', updateStates);
    });

    // HTMX and Notifications
    document.body.addEventListener("roleUpdated", () => {
        if (Notification.permission === "granted") new Notification("Success", { body: "Role Updated Successfully." });
    });

    htmx.on("htmx:beforeSwap", (e) => {
        if (e.detail.target.id == "update-role-modal-content" && !e.detail.xhr.response) location.reload();
    });

    const form = document.querySelector('form');
    if (form) {
        form.addEventListener('submit', () => {
            const btn = document.querySelector('.btn-save');
            btn.innerHTML = '<span class="spinner-grow spinner-grow-sm"></span> Updating...';
            btn.disabled = true;
        });
    }
}

initRolePermissions();
document.body.addEventListener('htmx:afterSwap', initRolePermissions);
</script>
