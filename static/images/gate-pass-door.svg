<!-- sample rectangle -->
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Door -->
  <rect x="30" y="14" width="20" height="35" rx="2" stroke="#333" stroke-width="2" fill="#EAEAEA"/>
  
  <!-- Door knob -->
  <circle cx="44" cy="32" r="2" fill="#333"/>
  
  <!-- Arrow (inflow) -->
  <line x1="6" y1="32" x2="28" y2="32" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <polyline points="20,24 28,32 20,40" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>